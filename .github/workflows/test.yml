name: Test

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: build distribution
        run: npm run build  
      - name: Commit and Push Dist File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: update distribution files [skip ci]"
          git push
      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@0bd7e8b279c9b5b36661d552472fbbfe671fe26e # v3.0.0
        with:
          tag_name: "latest"
          files: dist/CacheFinance.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify bundle is up to date
        run: npm run build:check
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
